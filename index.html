<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>徳永高法律事務所 基幹システム</title>
<style>
  :root{
    --text:#33475B;--muted:#516F90;--muted2:#7C98B6;--bg:#F5F8FA;--card:#FFFFFF;--border:#CBD6E2;--line:#EAF0F6;
    --rail:#2E3F50;--rail-hov:#26364A;--rail-on:#1D2C3D;--rail-txt:#AFBFD1;
    --orange:#FF7A59;--orange-d:#E66E50;--orange-soft:#FFF1EE;--link:#0091AE;--link-soft:#E5F5F8;
    --navy:#33475B;--navy-soft:#EAF0F6;--good:#00A88F;--good-soft:#E5F8F5;--warn:#DFA100;--warn-soft:#FDF5DE;
    --crit:#F2545B;--crit-soft:#FDEDEE;--purple:#6A78D1;--purple-soft:#EEF0FA;--grey:#7C98B6;--grey-soft:#F0F4F8;
    --shadow:0 1px 3px rgba(45,62,80,.08);--font:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",YuGothic,"Noto Sans JP",Meiryo,sans-serif;
  }
  *{box-sizing:border-box}html,body{margin:0;padding:0}
  body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px;line-height:1.55;-webkit-font-smoothing:antialiased}
  h1,h2,h3{margin:0}button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit}
  .tnum,td.num,th.num,.k-val{font-variant-numeric:tabular-nums}
  #login{position:fixed;inset:0;display:grid;place-items:center;background:linear-gradient(135deg,#2E3F50,#1D2C3D);z-index:100}
  .lbox{background:#fff;border-radius:10px;padding:32px 30px;width:340px;box-shadow:0 10px 40px rgba(0,0,0,.3)}
  .lbox .crest{width:44px;height:44px;border-radius:9px;background:#FF7A59;color:#fff;display:grid;place-items:center;font-weight:800;font-size:20px;margin:0 auto 14px}
  .lbox h1{font-size:16px;text-align:center;color:var(--navy);margin-bottom:4px}
  .lbox p{text-align:center;color:var(--muted);font-size:11.5px;margin:0 0 20px}
  .lbox label{font-size:11px;font-weight:700;color:var(--muted);display:block;margin:12px 0 5px}
  .lbox input{width:100%;border:1px solid var(--border);border-radius:6px;padding:10px 12px;font-size:14px;font-family:inherit}
  .lbox input:focus{outline:2px solid var(--link-soft);border-color:var(--link)}
  .lbox button{width:100%;background:var(--orange);color:#fff;font-weight:700;border-radius:6px;padding:11px;margin-top:20px;font-size:14px}
  .lbox button:hover{background:var(--orange-d)}
  .lerr{color:var(--crit);font-size:11.5px;text-align:center;margin-top:12px;min-height:16px}
  .app{display:none;grid-template-columns:216px 1fr;min-height:100vh}.app.on{display:grid}
  .rail{background:var(--rail);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .brand{padding:17px 16px 15px;display:flex;gap:10px;align-items:center;border-bottom:1px solid rgba(255,255,255,.08)}
  .brand .crest{width:31px;height:31px;border-radius:6px;background:#FF7A59;display:grid;place-items:center;color:#fff;font-weight:800;font-size:14px;flex:none}
  .brand b{color:#fff;font-size:13px;font-weight:700;line-height:1.3;display:block}.brand span{color:#8FA5BC;font-size:10px;font-weight:600;letter-spacing:.1em}
  .nav{padding:6px 8px 12px;flex:1;overflow:auto}
  .nlabel{font-size:9.5px;color:#6C84A0;letter-spacing:.14em;font-weight:700;padding:14px 10px 4px}
  .nav a{display:flex;align-items:center;gap:9px;padding:7.5px 10px;border-radius:4px;color:var(--rail-txt);text-decoration:none;font-size:12.5px;font-weight:500;cursor:pointer}
  .nav a .ic{width:16px;text-align:center;font-size:13px;opacity:.9}
  .nav a:hover{background:var(--rail-hov);color:#E4ECF3}.nav a.on{background:var(--rail-on);color:#fff;font-weight:600}
  .nav a .cnt{margin-left:auto;font-size:10px;background:rgba(255,255,255,.12);color:#C7D5E2;border-radius:9px;padding:1px 7px;font-weight:700}
  .railfoot{padding:12px 15px;border-top:1px solid rgba(255,255,255,.08);font-size:10.5px;color:#7C93AB;display:flex;align-items:center;gap:7px;justify-content:space-between}
  .railfoot button{color:#9FB3C6;font-size:11px}.railfoot button:hover{color:#fff}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--good);flex:none}
  .main{display:flex;flex-direction:column;min-width:0}
  .top{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:30}
  .top h1{font-size:15px;font-weight:700;color:var(--navy)}.top .sub{color:var(--muted);font-size:11px}
  .spacer{flex:1}
  .pill-live{font-size:10.5px;color:var(--good);background:var(--good-soft);border-radius:12px;padding:4px 10px;font-weight:700;display:inline-flex;gap:6px;align-items:center}
  .av{width:28px;height:28px;border-radius:50%;background:var(--navy);color:#fff;display:grid;place-items:center;font-weight:700;font-size:11px}
  .wrap{padding:20px 24px 60px;max-width:1280px;width:100%;margin:0 auto}
  .view{display:none}.view.on{display:block}
  .sectitle{font-size:13.5px;font-weight:700;color:var(--navy)}.secsub{color:var(--muted);font-size:11px;margin-top:1px}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
  .kpi{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:13px 15px 12px;box-shadow:var(--shadow)}
  .k-lab{font-size:11px;color:var(--muted);font-weight:600}
  .k-val{font-size:24px;font-weight:800;margin-top:6px;line-height:1.1;color:var(--navy)}
  .k-sub{font-size:10.5px;color:var(--muted);margin-top:4px}
  .grid2{display:grid;grid-template-columns:1.4fr 1fr;gap:14px;margin-bottom:14px}
  .panel{background:var(--card);border:1px solid var(--border);border-radius:6px;box-shadow:var(--shadow);margin-bottom:14px}
  .phead{padding:13px 17px 11px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
  .pbody{padding:14px 17px}
  .fn{display:flex;flex-direction:column;gap:8px}
  .fnrow{display:grid;grid-template-columns:110px 1fr 110px;align-items:center;gap:12px}
  .fnrow .fl{font-size:12px;font-weight:600}
  .fnbar{height:26px;border-radius:3px;display:flex;align-items:center;min-width:34px}
  .fnbar span{color:#fff;font-weight:700;font-size:11.5px;padding-left:9px;white-space:nowrap}
  .fnrow .fr{font-size:11px;color:var(--muted);text-align:right}.fnrow .fr b{color:var(--navy)}
  .mgrp{font-size:10px;font-weight:700;letter-spacing:.07em;color:var(--muted2);margin:11px 0 4px;display:flex;gap:8px;align-items:center}
  .mgrp:first-child{margin-top:0}.mgrp .gl{flex:1;height:1px;background:var(--line)}
  .mrow{display:flex;align-items:center;gap:9px;padding:4px 7px;border-radius:4px}.mrow:hover{background:var(--bg)}
  .chip{width:8px;height:8px;border-radius:2px;flex:none}.mname{font-size:12px;flex:1}
  .mcount{font-size:12.5px;font-weight:700;min-width:34px;text-align:right}
  .mbar{width:70px;height:4px;border-radius:2px;background:var(--grey-soft);overflow:hidden;flex:none}.mbar i{display:block;height:100%;border-radius:2px}
  .tablewrap{overflow-x:auto}
  table{border-collapse:separate;border-spacing:0;width:100%;font-size:12px;white-space:nowrap}
  thead th{text-align:left;font-size:10px;font-weight:700;color:var(--muted);padding:9px 12px;border-bottom:1px solid var(--border);background:var(--bg)}
  tbody td{padding:9px 12px;border-bottom:1px solid var(--line)}tbody tr:last-child td{border-bottom:none}
  tbody tr.click{cursor:pointer}tbody tr.click:hover td{background:#F7FAFC}
  td.num,th.num{text-align:right}.nm{font-weight:600}.sub2{color:var(--muted);font-size:11px}
  .b-mark{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:3px 10px 3px 8px;border-radius:11px;background:var(--grey-soft);white-space:nowrap}
  .b-mark .chip{width:7px;height:7px}
  .badge{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:11px;white-space:nowrap}
  .fchip{font-size:11.5px;font-weight:600;padding:5px 12px;border-radius:14px;border:1px solid var(--border);background:var(--card);color:var(--muted)}
  .fchip:hover{border-color:var(--link);color:var(--link)}.fchip.on{background:var(--navy);color:#fff;border-color:var(--navy)}
  .filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .searchbar{display:flex;gap:10px;margin-bottom:12px}
  .searchbar input{flex:1;border:1px solid var(--border);border-radius:4px;padding:9px 12px;font-size:13px;background:var(--card);font-family:inherit}
  .searchbar input:focus{outline:2px solid var(--link-soft);border-color:var(--link)}
  .pager{display:flex;gap:8px;align-items:center;justify-content:flex-end;padding:12px 4px 0;font-size:12px;color:var(--muted)}
  .pager button{border:1px solid var(--border);border-radius:5px;padding:5px 11px;font-weight:600}
  .pager button:disabled{opacity:.4;cursor:default}
  .d-grid{display:grid;grid-template-columns:300px 1fr;gap:14px;align-items:start}
  .d-head{background:var(--card);border:1px solid var(--border);border-radius:6px;box-shadow:var(--shadow);padding:16px 20px;margin-bottom:14px;display:flex;align-items:center;gap:15px;flex-wrap:wrap}
  .d-av{width:50px;height:50px;border-radius:50%;background:var(--navy);color:#fff;display:grid;place-items:center;font-size:20px;font-weight:700;flex:none}
  .d-head h2{font-size:18px;color:var(--navy)}
  .kv .r{display:flex;justify-content:space-between;gap:12px;padding:7px 0;border-bottom:1px solid var(--line);font-size:12px}
  .kv .r:last-child{border-bottom:none}.kv .kk{color:var(--muted)}.kv .vv{font-weight:600;text-align:right}
  .memo{background:#FBFAF4;border:1px solid #EFE6CD;border-radius:8px;padding:12px 13px;font-size:12px;line-height:1.7;color:#3B3627;white-space:pre-wrap;max-height:320px;overflow:auto}
  .rtabs{display:flex;gap:2px;border-bottom:1px solid var(--border);padding:0 17px}
  .rtabs button{padding:11px 15px 9px;font-size:12.5px;font-weight:600;color:var(--muted);border-bottom:2.5px solid transparent;margin-bottom:-1px}
  .rtabs button.on{color:var(--navy);border-bottom-color:var(--orange);font-weight:700}
  .rpane{display:none;padding:15px 17px}.rpane.on{display:block}
  .talk{display:flex;flex-direction:column;gap:9px;max-height:520px;overflow:auto;padding-right:4px}
  .msg{max-width:82%;padding:9px 12px;border-radius:10px;font-size:12px;line-height:1.55}
  .msg.in{background:var(--grey-soft);border-bottom-left-radius:2px;align-self:flex-start}
  .msg.out{background:var(--link-soft);border-bottom-right-radius:2px;align-self:flex-end}
  .msg.sys{background:transparent;color:var(--muted2);font-size:10.5px;align-self:center;text-align:center;max-width:100%}
  .msg .mt{font-size:9.5px;color:var(--muted2);margin-top:4px}
  .msg .imgph{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:11px;color:var(--link);text-decoration:none}
  .msg .imgph .ib{width:28px;height:28px;border-radius:4px;background:var(--navy-soft);display:grid;place-items:center;font-size:13px}
  .docgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .doccell{border:1px solid var(--border);border-radius:6px;padding:10px;font-size:10.5px;color:var(--muted);text-align:center;text-decoration:none;display:block}
  .doccell:hover{border-color:var(--link);background:var(--link-soft)}
  .doccell .dp{height:48px;border-radius:4px;display:grid;place-items:center;font-size:20px;margin-bottom:6px;background:var(--orange-soft);color:var(--orange-d)}
  .doccell b{display:block;font-size:11px;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .note{font-size:11.5px;color:var(--muted);background:var(--link-soft);border-radius:6px;padding:12px 14px;line-height:1.6}
  .empty{padding:40px;text-align:center;color:var(--muted2);font-size:12px}
  .spin{width:22px;height:22px;border:2.5px solid var(--line);border-top-color:var(--orange);border-radius:50%;animation:sp .7s linear infinite;margin:40px auto}
  @keyframes sp{to{transform:rotate(360deg)}}
  .seg{display:inline-flex;background:#E5EDF3;border-radius:5px;padding:3px;gap:2px}
  .seg button{padding:4.5px 13px;border-radius:3.5px;font-size:12px;font-weight:600;color:var(--muted)}
  .seg button.on{background:#fff;color:var(--navy);box-shadow:0 1px 2px rgba(45,62,80,.15);font-weight:700}
  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .toolbar label{font-size:11px;font-weight:600;color:var(--muted)}
  .toolbar select{border:1px solid var(--border);border-radius:5px;padding:6px 10px;font-size:12px;font-family:inherit;color:var(--text);background:var(--card)}
  thead th.stick,tbody td.stick{position:sticky;left:0;background:var(--card);z-index:1;border-right:1px solid var(--line)}
  thead th.stick{background:var(--bg);z-index:3}
  .heat{border-radius:3px;padding:2px 7px;font-weight:600;display:inline-block;min-width:44px;text-align:right}
  tr.total td{background:var(--bg);font-weight:700;border-top:1px solid var(--border)}
  .fn2{display:flex;flex-direction:column;gap:7px}
  .fn2 .row{display:grid;grid-template-columns:96px 1fr 96px;gap:10px;align-items:center;font-size:12px}
  .fn2 .bar{height:22px;border-radius:3px;display:flex;align-items:center;color:#fff;font-weight:700;font-size:11px;padding-left:8px;min-width:30px}
  .yjrow{display:grid;grid-template-columns:140px 80px 80px 1fr 74px 76px;gap:10px;align-items:center;padding:9px 4px;border-bottom:1px solid var(--line);font-size:12.5px}
  .yjrow:last-child{border-bottom:none}
  .pbar{height:8px;border-radius:4px;background:var(--grey-soft);overflow:hidden}.pbar i{display:block;height:100%;border-radius:4px}
  .pace{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:9px;text-align:center}
  .gedit input{width:76px;border:1px solid var(--border);border-radius:4px;padding:5px 7px;font-size:12px;text-align:right;font-family:inherit}
  .setgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .setcard{background:var(--card);border:1px solid var(--border);border-radius:6px;box-shadow:var(--shadow);padding:15px 17px}
  .setcard .st{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .setcard .si{width:34px;height:34px;border-radius:6px;display:grid;place-items:center;font-size:15px;flex:none}
  .setcard b{font-size:13px;color:var(--navy)}
  .setcard .sd{font-size:11px;color:var(--muted);line-height:1.6}
  .setcard code{background:var(--bg);border-radius:3px;padding:1px 6px;font-size:11px;color:var(--link)}

  /* ===== 書類ジェネレーター ===== */
  #docmodal{position:fixed;inset:0;background:rgba(20,30,42,.55);z-index:200;display:none}
  #docmodal.on{display:grid;grid-template-columns:400px 1fr}
  .docform{background:var(--card);height:100vh;overflow:auto;padding:20px 22px;box-shadow:2px 0 12px rgba(0,0,0,.15)}
  .docform h2{font-size:16px;color:var(--navy);margin-bottom:3px}
  .docform .fsub{font-size:11.5px;color:var(--muted);margin-bottom:16px}
  .fgrp{margin-bottom:16px}
  .fgrp .fh{font-size:11px;font-weight:700;color:var(--orange-d);letter-spacing:.04em;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--line)}
  .frow{margin-bottom:9px}
  .frow label{font-size:10.5px;font-weight:600;color:var(--muted);display:block;margin-bottom:3px}
  .frow input,.frow select,.frow textarea{width:100%;border:1px solid var(--border);border-radius:5px;padding:7px 9px;font-size:12.5px;font-family:inherit;color:var(--text)}
  .frow input:focus,.frow select:focus,.frow textarea:focus{outline:2px solid var(--link-soft);border-color:var(--link)}
  .frow.two{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .fauto{background:var(--navy-soft);border-radius:6px;padding:10px 12px;font-size:11px;color:var(--muted);line-height:1.6}
  .fauto b{color:var(--navy)}
  .radio-inline{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;padding:4px 0}
  .radio-inline label{display:flex;gap:4px;align-items:center;font-weight:500;color:var(--text);cursor:pointer}
  .docimg-pick{display:flex;flex-direction:column;gap:8px}
  .docimg-preview{max-width:100%;max-height:160px;border:1px solid var(--border);border-radius:6px;object-fit:contain;background:var(--bg)}
  .docbar{position:sticky;bottom:0;background:var(--card);border-top:1px solid var(--border);padding:12px 0 4px;margin-top:8px;display:flex;gap:8px}
  .docbar button{flex:1;border-radius:6px;padding:10px;font-weight:700;font-size:12.5px}
  .docbar .close{background:var(--card);border:1px solid var(--border);color:var(--muted)}
  .docbar .print{background:var(--orange);color:#fff}.docbar .print:hover{background:var(--orange-d)}
  .docbar .sent{background:var(--good);color:#fff}
  .docprev-wrap{overflow:auto;height:100vh;padding:26px;display:flex;flex-direction:column;align-items:center;gap:20px}

  /* A4書面 */
  .a4{background:#fff;width:210mm;min-height:297mm;padding:20mm 18mm;box-shadow:0 3px 16px rgba(0,0,0,.25);font-family:"Hiragino Mincho ProN","Yu Mincho",YuMincho,serif;color:#111;font-size:10.5pt;line-height:1.9;position:relative}
  .a4 .tt{text-align:center;font-size:20pt;font-weight:700;letter-spacing:.3em;padding:0 0 4px;margin:6px 0 20px;border-top:1.5px solid #111;border-bottom:1.5px solid #111;display:inline-block;left:50%;position:relative;transform:translateX(-50%)}
  .a4 .ttwrap{text-align:center}
  .fax-top{display:flex;justify-content:space-between;gap:30px;margin-top:10px}
  .fax-left{flex:1}
  .fax-left .r{display:flex;gap:8px;align-items:flex-end;margin-bottom:14px}
  .fax-left .r .k{white-space:nowrap;letter-spacing:.3em}
  .fax-left .r .v{flex:1;border-bottom:1px solid #111;padding:0 4px 2px}
  .fax-right{width:52%;font-size:10pt;line-height:1.85}
  .fax-right .fname{font-weight:700;font-size:11pt;margin-bottom:6px}
  .hr-thick{border:none;border-top:3px solid #111;margin:22px 0}
  .center{text-align:center}
  .doc-note{font-size:8.5pt;color:#333;margin-bottom:6px}
  .doc-date{text-align:right;letter-spacing:.15em;margin:4px 0 14px}
  .chk{display:inline-block;width:1em;text-align:center}
  .u{border-bottom:1px solid #111;padding:0 6px;display:inline-block;min-width:2em}
  .box{border:1px solid #111;padding:8px 10px;margin:6px 0;min-height:2.4em}
  .lead{margin:14px 0;text-indent:1em;line-height:2}
  .lead b{font-weight:700}
  .num{margin:12px 0 4px;font-weight:600}
  .dmg-grid{display:flex;gap:16px;margin-top:24px}
  .dmg-img{width:46%}
  .dmg-img img{width:100%;border:1px solid #ccc}
  .dmg-box{flex:1;border:1px solid #111;padding:14px 16px;line-height:2.2;height:fit-content}
  .stamp{display:inline-block;color:#c0392b;border:1.5px solid #c0392b;border-radius:50%;width:2.6em;height:2.6em;line-height:1.2;text-align:center;font-size:7pt;transform:rotate(-8deg);margin:0 4px;vertical-align:middle;padding-top:.4em}

  @media print{
    body{background:#fff}
    .app,#docmodal .docform,.docbar,.top,.rail{display:none!important}
    #docmodal{position:static;display:block;background:#fff}
    #docmodal.on{display:block}
    .docprev-wrap{height:auto;padding:0;display:block}
    .a4{box-shadow:none;margin:0;width:auto;min-height:auto;padding:14mm 16mm;page-break-after:always}
    .a4:last-child{page-break-after:auto}
  }
</style>
</head>
<body>

<div id="login">
  <div class="lbox">
    <div class="crest">徳</div>
    <h1>徳永高法律事務所 基幹システム</h1>
    <p>返金請求オペレーション</p>
    <form id="lform">
      <label>メールアドレス</label>
      <input id="lemail" type="email" autocomplete="username" value="knt.yd.36@gmail.com">
      <label>パスワード</label>
      <input id="lpass" type="password" autocomplete="current-password" placeholder="パスワード">
      <button type="submit" id="lbtn">ログイン</button>
      <div class="lerr" id="lerr"></div>

let TOKEN=null, ME=null;

async function api(path){
  const r=await fetch(CFG.url+'/rest/v1/'+path,{headers:{apikey:CFG.key,Authorization:'Bearer '+TOKEN}});
  if(!r.ok)throw new Error('API '+r.status);
  return r.json();
}
// PostgRESTの1000件上限を越えて全件取得（Rangeでページング）
async function apiAll(path){
  let out=[],from=0,step=1000;
  for(;;){
    const r=await fetch(CFG.url+'/rest/v1/'+path,{headers:{apikey:CFG.key,Authorization:'Bearer '+TOKEN,Range:from+'-'+(from+step-1)}});
    if(!r.ok)throw new Error('API '+r.status);
    const rows=await r.json(); out=out.concat(rows);
    if(rows.length<step)break; from+=step;
  }
  return out;
}
async function count(path){
  const r=await fetch(CFG.url+'/rest/v1/'+path,{headers:{apikey:CFG.key,Authorization:'Bearer '+TOKEN,Prefer:'count=exact',Range:'0-0'}});
  return +((r.headers.get('content-range')||'/0').split('/')[1])||0;
}

 {g:'アクティブ・追客',key:'active',c:'navy',marks:['未反応','要・電話日程調整','電話日程切り済み','不通','対応中（迫田）','対応中（下沢）','回答後レス無し','要対応（クレーム）']},

    html+=`</div></div></div>`;

let listFilter='all', listJudge='all', listPage=0, listQ='';
const PAGE=40;
const JUDGE_C={'有効':C.good,'送客':C.purple,'見込み外':C.grey,'未判定':C.warn};
const judgeBadge=j=>j?`<span class="b-mark" style="background:${(JUDGE_C[j]||C.grey)}1c;color:${JUDGE_C[j]||C.grey}"><span class="chip" style="background:${JUDGE_C[j]||C.grey}"></span>${esc(j)}</span>`:'—';
function loadListMeta(){
  const groups=[['all','すべて'],['active','アクティブ・追客'],['closing','クロージング・入金'],['soukyaku','送客'],['invalid','無効リード'],['lost','失注']];
  const judges=[['all','判定:全て'],['有効','有効'],['送客','送客'],['見込み外','見込み外'],['未判定','未判定']];
  $('listfilters').innerHTML=groups.map((g,i)=>`<button class="fchip ${i===0?'on':''}" data-f="${g[0]}">${g[1]}</button>`).join('')
    +'<span style="width:1px;background:var(--line);margin:2px 6px;align-self:stretch"></span>'
    +judges.map((g,i)=>`<button class="fchip jchip ${i===0?'on':''}" data-j="${g[0]}">${g[1]}</button>`).join('');
  document.querySelectorAll('#listfilters .fchip[data-f]').forEach(b=>b.onclick=()=>{
    document.querySelectorAll('#listfilters .fchip[data-f]').forEach(x=>x.classList.remove('on'));b.classList.add('on');
    listFilter=b.dataset.f;listPage=0;loadList();});
  document.querySelectorAll('#listfilters .jchip').forEach(b=>b.onclick=()=>{
    document.querySelectorAll('#listfilters .jchip').forEach(x=>x.classList.remove('on'));b.classList.add('on');
    listJudge=b.dataset.j;listPage=0;loadList();});
  let qt;$('q').addEventListener('input',e=>{clearTimeout(qt);qt=setTimeout(()=>{listQ=e.target.value.trim();listPage=0;loadList();},300);});
}
async function loadList(){
  $('ltable').innerHTML='<tbody><tr><td><div class="spin"></div></td></tr></tbody>';
  let base='customers?select=id,name,taiou_mark,mark_group,judged,damage_amount,pay_method,owner,added_at&order=added_at.desc';
  if(listFilter!=='all')base+='&mark_group=eq.'+listFilter;
  if(listJudge!=='all')base+='&judged=eq.'+encodeURIComponent(listJudge);
  if(listQ)base+='&name=ilike.*'+encodeURIComponent(listQ)+'*';
  const cnt=await count(base);
  const rows=await api(base+`&limit=${PAGE}&offset=${listPage*PAGE}`);
  let html='<thead><tr><th>顧客</th><th>対応マーク（フェーズ）</th><th>判定</th><th>被害額</th><th>送金方法</th><th>担当</th><th>流入日</th></tr></thead><tbody>';
  if(!rows.length)html+='<tr><td colspan="7"><div class="empty">該当なし</div></td></tr>';
  rows.forEach(r=>{
    const d=r.added_at?new Date(r.added_at).toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'}):'';
    html+=`<tr class="click" data-id="${r.id}"><td class="nm" style="color:var(--link)">${esc(r.name||'（名前未登録）')}</td>
      <td><span class="b-mark"><span class="chip" style="background:${markColor(r.taiou_mark)}"></span>${esc(r.taiou_mark||'—')}</span></td>
      <td>${judgeBadge(r.judged)}</td>
      <td class="sub2">${esc(r.damage_amount||'—')}</td><td class="sub2">${esc(r.pay_method||'—')}</td>
      <td class="sub2">${esc(r.owner||'—')}</td><td class="sub2">${d}</td></tr>`;
  });
  html+='</tbody>';$('ltable').innerHTML=html;
  document.querySelectorAll('#ltable tr.click').forEach(tr=>tr.onclick=()=>openDetail(tr.dataset.id));
  const pages=Math.max(1,Math.ceil(cnt/PAGE));
  $('pager').innerHTML=`<span>${cnt.toLocaleString()}件中 ${cnt?listPage*PAGE+1:0}–${Math.min((listPage+1)*PAGE,cnt)}</span>
    <button ${listPage===0?'disabled':''} id="pprev">‹ 前</button><button ${listPage>=pages-1?'disabled':''} id="pnext">次 ›</button>`;
  if($('pprev'))$('pprev').onclick=()=>{if(listPage>0){listPage--;loadList();}};
  if($('pnext'))$('pnext').onclick=()=>{if(listPage<pages-1){listPage++;loadList();}};
}

async function openDetail(id){
  go('detail'); $('nav-detail').style.display='';
  $('detail-body').innerHTML='<div class="spin"></div>';
  try{
    const [c]=await api(`customers?id=eq.${id}&select=*`);
    const msgs=await api(`messages?customer_id=eq.${id}&select=direction,mtype,body,sent_at,line_message_id&order=sent_at.asc&limit=300`);
    const media=await api(`media?customer_id=eq.${id}&select=filename,drive_url,status,bytes,line_message_id&order=created_at.desc`);
    const hist=await api(`mark_history?customer_id=eq.${id}&select=from_mark,to_mark,changed_at&order=changed_at.desc&limit=30`);
    const docs=await api(`documents?customer_id=eq.${id}&select=id,kind,created_at,created_by,filename:payload->>filename,drive_url:payload->>drive_url&order=created_at.desc&limit=50`);
    renderDetail(c,msgs,media,hist,docs);

const SEL_NAMES={'2004672':'迫田','2004671':'下沢'}; // Lステップ選択肢ID→表示名（担当者）
function renderInfos(c){
  const fis=(c.raw&&c.raw.friend_infos)||[];
  if(!fis.length)return '<div class="empty">友だち情報なし（未回答）</div>';
  const order=['リード判別','初回_送金額','初回_被害時期','初回_送金方法','被害総額','送金方法','被害にあったサイト名','被害内容','被害の詳細','名前','電話番号','年齢','都道府県','フォーム回答日','担当者','検索したKW','初回電話予定日','初回通電日','初回見積もり提出日','契約書締結日','支払い方法','初回入金日','初回入金額','失注理由','失注日'];
  const rank=n=>{const i=order.findIndex(o=>n.includes(o));return i<0?99:i;};
  const rows=fis.slice().sort((a,b)=>rank(a.name)-rank(b.name)).map(fi=>{
    let v=String(fi.value??'');
    if(SEL_NAMES[v])v=SEL_NAMES[v];
    return `<div class="mrow"><span class="sub2" style="width:150px;flex:none">${esc(fi.name)}</span><span style="word-break:break-all"><b>${esc(v)}</b></span></div>`;
  }).join('');
  return rows;
}
function renderDetail(c,msgs,media,hist,docs){
  docs=docs||[];
  const nm=c.name||'（名前未登録）';
  const imgByLmid={}; media.forEach(m=>imgByLmid[m.line_message_id]=m);
  let talk='';
  msgs.forEach(m=>{
    const time=new Date(m.sent_at).toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
    if(m.mtype==='template'){talk+=`<div class="msg sys">【カルーセル/テンプレ送信】 ${time}</div>`;return;}
    const side=m.direction==='outbound'?'out':'in';
    let inner;
    if(m.mtype==='image'){
      const mm=imgByLmid[m.line_message_id], st=mm&&mm.status;
      let lab='受信画像（保存待ち）';
      if(mm&&mm.drive_url)lab='受信画像を開く（Drive保存済）';
      else if(st==='saved')lab='受信画像（Drive保存済）';
      else if(st==='expired')lab='受信画像（LINE保存期限切れ・取得不可）';
      inner=(mm&&mm.drive_url)?`<a class="imgph" href="${esc(mm.drive_url)}" target="_blank" rel="noopener"><span class="ib">🖼</span>${lab}</a>`
                :`<span class="imgph" style="${st==='expired'?'opacity:.6':''}"><span class="ib">🖼</span>${lab}</span>`;
    }else{inner=esc(m.body||'（'+m.mtype+'）');}
    talk+=`<div class="msg ${side}">${inner}<div class="mt">${time}</div></div>`;
  });
  const saved=media.filter(m=>m.status==='saved');
  const expired=media.filter(m=>m.status==='expired').length;
  const cell=m=>{const inner=`<div class="dp">🖼</div><b>${esc(m.filename||'画像')}</b><span>${m.drive_url?'Drive・開く':'Drive保存済'}</span>`;
    return m.drive_url?`<a class="doccell" href="${esc(m.drive_url)}" target="_blank" rel="noopener">${inner}</a>`:`<div class="doccell" style="cursor:default">${inner}</div>`;};
  const docCells=saved.length?saved.map(cell).join('')
    :`<div class="empty">保存済み画像なし${expired?`（${expired}件はLINE保存期限切れで取得不可）`:''}</div>`;
  const expNote=expired&&saved.length?`<div class="note" style="margin-top:12px">うち ${expired}件 はLINE側の保存期限切れで取得できませんでした（過去分のみ）。今後の受信画像は毎時取得で自動保存されます。</div>`:'';
  const histRows=hist.length?hist.map(h=>`<div class="mrow"><span class="sub2" style="width:96px">${new Date(h.changed_at).toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}</span><span>${esc(h.from_mark||'—')} → <b>${esc(h.to_mark||'—')}</b></span></div>`).join(''):'<div class="empty">変更履歴なし（次回同期以降のマーク変更が記録されます）</div>';
  $('detail-body').innerHTML=`
    <div class="d-head"><div class="d-av">${esc(nm[0])}</div>
      <div style="flex:1;min-width:200px"><h2>${esc(nm)}</h2>
        <div class="sub2" style="margin-top:3px">UID ${esc((c.uid||'').slice(0,14))}… ・ 流入 ${c.added_at?new Date(c.added_at).toLocaleDateString('ja-JP'):'—'}${c.doc_status?` ・ <b style="color:var(--good)">📄 ${esc(c.doc_status)}</b>`:''}</div></div>
      <button class="btn" id="docbtn" style="background:var(--orange);color:#fff;font-weight:700;border-radius:5px;padding:9px 16px">📄 資料作成</button>
      ${judgeBadge(c.judged)}
      <span class="b-mark" style="background:${markColor(c.taiou_mark)}1c;color:${markColor(c.taiou_mark)}"><span class="chip" style="background:${markColor(c.taiou_mark)}"></span>${esc(c.taiou_mark||'—')}</span>
    </div>

async function saveDocPdf(){
  const btn=$('docsave'); btn.textContent='生成中…'; btn.disabled=true;
  try{
    if(!window.html2pdf){
      await new Promise((ok,ng)=>{const s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
        s.onload=ok;s.onerror=()=>ng(new Error('PDFライブラリ読込失敗'));document.head.appendChild(s);});
    }
    const blob=await html2pdf().set({margin:0,image:{type:'jpeg',quality:.92},
      html2canvas:{scale:2,useCORS:true},jsPDF:{unit:'mm',format:'a4'},pagebreak:{mode:'css'}})
      .from($('docprev')).outputPdf('blob');
    const b64=await new Promise(r=>{const fr=new FileReader();fr.onload=()=>r(fr.result.split(',')[1]);fr.readAsDataURL(blob);});
    const fn=`口座凍結要請書_${(DOC.vName||'無名').replace(/\s/g,'')}_${new Date().toISOString().slice(0,10)}.pdf`;
    const r=await fetch(`${CFG.url}/rest/v1/documents`,{method:'POST',
      headers:{apikey:CFG.key,Authorization:'Bearer '+TOKEN,'Content-Type':'application/json',Prefer:'return=minimal'},
      body:JSON.stringify({customer_id:DOC._cid,kind:'freeze_request_pdf',
        payload:{filename:fn,form:{...DOC,imgData:DOC.imgData?'(image)':null},pdf_b64:b64,bytes:blob.size},
        created_by:(ME&&ME.email)||null})});
    if(!r.ok)throw new Error('保存API '+r.status);
    btn.textContent='✓ 保存済み';
  }catch(e){alert('クラウド保存エラー: '+e.message);btn.textContent='☁ クラウド保存';btn.disabled=false;}
}
async function downloadDocPdf(docId){
  const [d]=await api(`documents?id=eq.${docId}&select=payload`);
  if(!d||!d.payload||!d.payload.pdf_b64)return alert('PDFデータがありません');
  const bin=atob(d.payload.pdf_b64), u8=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)u8[i]=bin.charCodeAt(i);
  const url=URL.createObjectURL(new Blob([u8],{type:'application/pdf'}));
  const a=document.createElement('a');a.href=url;a.download=d.payload.filename||'document.pdf';a.click();
  setTimeout(()=>URL.revokeObjectURL(url),5000);
}

}

function go(v){
  if(isSales()&&HIDDEN_FOR_SALES.includes(v))v='home';
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('on'));
  $('v-'+v).classList.add('on');
  document.querySelectorAll('#nav a').forEach(a=>a.classList.toggle('on',a.dataset.v===v));
  $('t-title').textContent=TITLES[v][0];$('t-sub').textContent=TITLES[v][1];
  window.scrollTo(0,0);
  if(v==='lost')loadLost();
  if(v==='list')loadList();
  if(v==='sales')loadSales();
  if(v==='mkt')loadMkt();
  if(v==='yojitsu')loadYojitsu();
  if(v==='goals')loadGoals();
  if(v==='settings')loadSettings();
}
document.querySelectorAll('#nav a').forEach(a=>a.onclick=()=>go(a.dataset.v));

/* ===== 共通集計: 月次顧客データ ===== */
let SALES_CACHE=null;
async function salesData(){
  if(SALES_CACHE)return SALES_CACHE;
  const rows=await apiAll('customers?select=added_at,mark_group,taiou_mark');
  const M={};
  rows.forEach(r=>{
    const mo=(r.added_at||'').slice(0,7); if(!mo)return;
    M[mo]=M[mo]||{mo,inflow:0,active:0,closing:0,soukyaku:0,invalid:0,lost:0,keiyaku:0};
    M[mo].inflow++; M[mo][r.mark_group]=(M[mo][r.mark_group]||0)+1;
    if(r.taiou_mark==='契約者（入金済み）')M[mo].keiyaku++;
  });
  SALES_CACHE=Object.values(M).sort((a,b)=>a.mo<b.mo?-1:1);
  return SALES_CACHE;
}

/* ===== 営業分析 ===== */
async function loadSales(){
  try{
    const M=await salesData();
    const AOV=250000;
    let html=`<div class="panel"><div class="phead"><div><div class="sectitle">月次ファネル（実データ）</div><div class="secsub">流入(LINE追加)→対応対象→契約者。対応対象＝アクティブ+クロージング+送客</div></div></div><div class="tablewrap"><table><thead><tr><th class="stick">月</th><th class="num">流入</th><th class="num">対応対象</th><th class="num">クロージング層</th><th class="num">契約者</th><th class="num">対応対象率</th><th class="num">契約率</th><th class="num">推定売上</th></tr></thead><tbody>`;
    let t={inflow:0,tgt:0,cl:0,k:0};
    M.forEach(m=>{const tgt=(m.active||0)+(m.closing||0)+(m.soukyaku||0);
      t.inflow+=m.inflow;t.tgt+=tgt;t.cl+=(m.closing||0);t.k+=m.keiyaku;
      html+=`<tr><td class="stick nm">${m.mo}</td><td class="num">${m.inflow}</td><td class="num">${tgt}</td><td class="num">${m.closing||0}</td><td class="num" style="font-weight:700;color:${C.good}">${m.keiyaku}</td><td class="num">${f1(pc(tgt,m.inflow))}%</td><td class="num">${f1(pc(m.keiyaku,tgt))}%</td><td class="num">${yen(m.keiyaku*AOV)}</td></tr>`;});
    html+=`<tr class="total"><td class="stick">合計</td><td class="num">${t.inflow}</td><td class="num">${t.tgt}</td><td class="num">${t.cl}</td><td class="num" style="color:${C.good}">${t.k}</td><td class="num">${f1(pc(t.tgt,t.inflow))}%</td><td class="num">${f1(pc(t.k,t.tgt))}%</td><td class="num">${yen(t.k*AOV)}</td></tr></tbody></table></div></div>`;
    // 転換率まとめ
    const last=M[M.length-1]||{};
    html+=`<div class="grid2" style="grid-template-columns:1fr 1fr"><div class="panel"><div class="phead"><div class="sectitle">直近月の内訳（${last.mo||'-'}）</div></div><div class="pbody"><div class="fn2">`;
    [['流入',last.inflow||0,C.navy],['アクティブ・追客',last.active||0,C.link],['クロージング',last.closing||0,C.good],['送客',last.soukyaku||0,C.purple],['契約者',last.keiyaku||0,C.good]].forEach((x,i,arr)=>{const mx=arr[0][1]||1;html+=`<div class="row"><span>${x[0]}</span><div class="bar" style="width:${Math.max(x[1]/mx*100,6)}%;background:${x[2]}">${x[1]}</div><span class="sub2"></span></div>`;});
    html+=`</div></div></div><div class="panel"><div class="phead"><div class="sectitle">累計サマリー</div></div><div class="pbody"><div class="kv">
      <div class="r"><span class="kk">総流入</span><span class="vv">${t.inflow.toLocaleString()}</span></div>
      <div class="r"><span class="kk">契約者（受任）</span><span class="vv" style="color:${C.good}">${t.k}</span></div>
      <div class="r"><span class="kk">全体契約率（契約/対応対象）</span><span class="vv">${f1(pc(t.k,t.tgt))}%</span></div>
      <div class="r"><span class="kk">推定累計売上（@¥250,000）</span><span class="vv">${yen(t.k*AOV)}</span></div>
    </div><div class="note" style="margin-top:10px"><b>担当者別（迫田/下沢）</b>は、Lステップ「営業入力用」タブの担当者IDを接続後に表示されます。</div></div></div></div>`;
    $('sales-body').innerHTML=html;
  }catch(e){$('sales-body').innerHTML=`<div class="empty">エラー: ${esc(e.message)}</div>`;}
}

/* ===== マーケ分析（KW別ROAS・クロス分析・指標選択） ===== */
let AD_CACHE=null, mktAxis='kw', mktMetric='cost', mktAOV=250000;
async function loadMkt(){
  try{
    if(!AD_CACHE)AD_CACHE=await apiAll('ad_kw?select=kw,match_type,month,cost,quote_cnt,won_cnt,cpo');
    renderMkt();
  }catch(e){$('mkt-body').innerHTML=`<div class="empty">エラー: ${esc(e.message)}</div>`;}
}
const MKT_METRICS={
  cost:['広告費',r=>r.cost,'yen'], quote:['見積提出',r=>r.quote,'int'], won:['成約数',r=>r.won,'int'],
  cpo:['CPO（成約単価）',r=>r.won?r.cost/r.won:0,'yen'], wonrate:['成約率',r=>pc(r.won,r.quote),'pct'],
  sales:['推定売上',r=>r.won*mktAOV,'yen'], roas:['推定ROAS',r=>r.cost?r.won*mktAOV/r.cost:0,'roas'],
};
function fmtM(v,t){if(t==='yen')return yen(v);if(t==='pct')return f1(v)+'%';if(t==='roas')return (v).toFixed(2);return Math.round(v).toLocaleString();}
function renderMkt(){
  const rows=AD_CACHE.map(r=>({kw:r.kw,match:r.match_type,month:r.month,cost:+r.cost||0,quote:+r.quote_cnt||0,won:+r.won_cnt||0}));
  const tot=rows.reduce((s,r)=>({cost:s.cost+r.cost,quote:s.quote+r.quote,won:s.won+r.won}),{cost:0,quote:0,won:0});
  const estSales=tot.won*mktAOV, roas=tot.cost?estSales/tot.cost:0;
  const kpi=(l,v,c,s)=>`<div class="kpi"><div class="k-lab">${l}</div><div class="k-val" style="color:${c};font-size:21px">${v}</div><div class="k-sub">${s||''}</div></div>`;
  let html=`<div class="kpis">
    ${kpi('総広告費',yen(tot.cost),C.navy,'KW実データ')}
    ${kpi('成約数',tot.won,C.good,'見積提出 '+tot.quote)}
    ${kpi('CPO（成約単価）',tot.won?yen(tot.cost/tot.won):'—',C.orange,'広告費÷成約')}
    ${kpi('推定ROAS',roas.toFixed(2),roas>=1?C.good:C.crit,'売上¥'+Math.round(estSales/10000)+'万÷広告費')}
  </div>`;
  // クロス分析（軸×指標 選択）
  html+=`<div class="panel"><div class="phead"><div><div class="sectitle">クロス分析</div><div class="secsub">軸と指標を選んでKW広告データを分解</div></div>
    <div class="toolbar">
      <label>軸</label><select id="mkt-axis">${[['kw','検索KW'],['match','マッチタイプ'],['month','月']].map(o=>`<option value="${o[0]}" ${mktAxis===o[0]?'selected':''}>${o[1]}</option>`).join('')}</select>
      <label>指標</label><select id="mkt-metric">${Object.entries(MKT_METRICS).map(([k,v])=>`<option value="${k}" ${mktMetric===k?'selected':''}>${v[0]}</option>`).join('')}</select>
      <label>平均単価</label><select id="mkt-aov">${[200000,250000,300000].map(a=>`<option value="${a}" ${mktAOV===a?'selected':''}>¥${(a/10000)}万</option>`).join('')}</select>
    </div></div><div class="tablewrap" id="mkt-cross"></div></div>`;
  // KW×月 全表
  html+=`<div class="panel"><div class="phead"><div><div class="sectitle">KW × 月 明細（広告費順）</div><div class="secsub">広告費 / 見積提出 / 成約 / CPO / 推定ROAS</div></div></div><div class="tablewrap" style="max-height:520px;overflow:auto" id="mkt-table"></div></div>`;
  $('mkt-body').innerHTML=html;
  $('mkt-axis').onchange=e=>{mktAxis=e.target.value;renderCross();};
  $('mkt-metric').onchange=e=>{mktMetric=e.target.value;renderCross();};
  $('mkt-aov').onchange=e=>{mktAOV=+e.target.value;renderMkt();};
  renderCross(); renderMktTable(rows);
}
function renderCross(){
  const rows=AD_CACHE.map(r=>({kw:r.kw,match:r.match_type,month:r.month,cost:+r.cost||0,quote:+r.quote_cnt||0,won:+r.won_cnt||0}));
  const g={};
  rows.forEach(r=>{const k=r[mktAxis];g[k]=g[k]||{k,cost:0,quote:0,won:0};g[k].cost+=r.cost;g[k].quote+=r.quote;g[k].won+=r.won;});
  const mf=MKT_METRICS[mktMetric];
  let arr=Object.values(g).map(x=>({...x,val:mf[1](x)}));
  arr.sort((a,b)=>b.val-a.val);
  const mx=Math.max(...arr.map(a=>a.val),1);
  const AXN={kw:'検索KW',match:'マッチタイプ',month:'月'};
  let html=`<table><thead><tr><th class="stick">${AXN[mktAxis]}</th><th class="num">広告費</th><th class="num">見積提出</th><th class="num">成約</th><th class="num">${mf[0]}</th><th style="width:160px"></th></tr></thead><tbody>`;
  arr.forEach(a=>{html+=`<tr><td class="stick nm">${esc(a.k)}</td><td class="num">${yen(a.cost)}</td><td class="num">${a.quote}</td><td class="num">${a.won}</td>
    <td class="num" style="font-weight:700">${fmtM(a.val,mf[2])}</td>
    <td><div class="mbar" style="width:150px"><i style="width:${Math.max(a.val/mx*100,1)}%;background:${C.orange}"></i></div></td></tr>`;});
  html+='</tbody></table>';
  $('mkt-cross').innerHTML=html;
}
function renderMktTable(rows){
  rows.sort((a,b)=>b.cost-a.cost);
  let html=`<table><thead><tr><th class="stick">検索KW</th><th>マッチ</th><th>月</th><th class="num">広告費</th><th class="num">見積</th><th class="num">成約</th><th class="num">CPO</th><th class="num">推定ROAS</th></tr></thead><tbody>`;
  rows.forEach(r=>{const roas=r.cost?r.won*mktAOV/r.cost:0;
    html+=`<tr><td class="stick nm">${esc(r.kw)}</td><td class="sub2">${esc(r.match)}</td><td class="sub2">${r.month}</td>
    <td class="num">${yen(r.cost)}</td><td class="num">${r.quote}</td><td class="num">${r.won}</td>
    <td class="num">${r.won?yen(r.cost/r.won):'—'}</td>
    <td class="num"><span class="heat" style="${roas>=2?'background:'+C.good+'22;color:'+C.good:roas>0?'':''}">${roas?roas.toFixed(2):'—'}</span></td></tr>`;});
  html+='</tbody></table>';
  $('mkt-table').innerHTML=html;
}

/* ===== 予実管理 ===== */
async function loadYojitsu(){
  try{
    const M=await salesData();
    const goals=await api('goals?select=month,key,target');
    const gmap={}; goals.forEach(g=>{gmap[g.month]=gmap[g.month]||{};gmap[g.month][g.key]=+g.target;});
    const months=[...new Set([...M.map(m=>m.mo),...Object.keys(gmap)])].sort();
    const cur=months[months.length-1];
    const act=M.find(m=>m.mo===cur)||{};
    const g=gmap[cur]||{};
    const AOV=250000;
    const actuals={inflow:act.inflow||0,keiyaku:act.keiyaku||0,revenue:(act.keiyaku||0)*AOV};
    const items=[['inflow','流入（LINE追加）',actuals.inflow],['keiyaku','契約者（受任）',actuals.keiyaku],['revenue','売上（推定）',actuals.revenue]];
    let html=`<div class="panel"><div class="phead"><div><div class="sectitle">予実管理 ${cur||''}</div><div class="secsub">目標は「目標設定」で編集</div></div><button class="btn" style="background:var(--card);border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:5px" onclick="go('goals')">目標を設定 ›</button></div><div class="pbody">`;
    if(!goals.length)html+=`<div class="note" style="margin-bottom:12px">まだ目標が未設定です。「目標を設定」から入力すると達成率が表示されます。</div>`;
    html+=`<div class="yjrow" style="font-size:10px;font-weight:700;color:var(--muted);border-bottom:1px solid var(--border)"><span>KPI</span><span style="text-align:right">実績</span><span style="text-align:right">目標</span><span>進捗</span><span style="text-align:right">達成率</span><span style="text-align:center">判定</span></div>`;
    items.forEach(it=>{const tg=g[it[0]]||0;const rate=tg?pc(it[2],tg):0;const isMoney=it[0]==='revenue';
      const barC=rate>=90?C.good:rate>=60?C.warn:C.crit;
      html+=`<div class="yjrow"><span class="nm">${it[1]}</span>
        <span class="num" style="text-align:right;font-weight:700">${isMoney?yen(it[2]):it[2].toLocaleString()}</span>
        <span class="num" style="text-align:right;color:var(--muted)">${tg?(isMoney?yen(tg):tg.toLocaleString()):'—'}</span>
        <span class="pbar"><i style="width:${Math.min(rate,100)}%;background:${barC}"></i></span>
        <span class="num" style="text-align:right;font-weight:800;color:${barC}">${tg?f1(rate)+'%':'—'}</span>
        <span class="pace" style="background:${rate>=90?'var(--good-soft)':rate>=60?'var(--warn-soft)':'var(--crit-soft)'};color:${barC}">${tg?(rate>=90?'達成':rate>=60?'追う':'未達'):'-'}</span></div>`;});
    html+=`</div></div>`;
    $('yj-body2').innerHTML=html;
  }catch(e){$('yj-body2').innerHTML=`<div class="empty">エラー: ${esc(e.message)}</div>`;}
}

/* ===== 目標設定 ===== */
async function loadGoals(){
  try{
    const M=await salesData();
    const goals=await api('goals?select=month,key,target');
    const gmap={}; goals.forEach(g=>{gmap[g.month]=gmap[g.month]||{};gmap[g.month][g.key]=+g.target;});
    const months=M.map(m=>m.mo).slice(-6);
    const keys=[['inflow','流入'],['keiyaku','契約者'],['revenue','売上（円）']];
    let html=`<div class="panel"><div class="phead"><div><div class="sectitle">月間目標の設定</div><div class="secsub">数値を入力して保存。予実管理に反映されます</div></div><button class="btn" id="gsave" style="background:var(--orange);color:#fff;padding:8px 16px;border-radius:5px;font-weight:700">保存</button></div>
      <div class="tablewrap"><table class="gedit"><thead><tr><th class="stick">月</th>${keys.map(k=>`<th class="num">${k[1]}</th>`).join('')}</tr></thead><tbody>`;
    months.forEach(mo=>{html+=`<tr><td class="stick nm">${mo}</td>${keys.map(k=>`<td class="num"><input data-mo="${mo}" data-key="${k[0]}" value="${(gmap[mo]&&gmap[mo][k[0]])||''}" inputmode="numeric"></td>`).join('')}</tr>`;});
    html+=`</tbody></table></div></div>`;
    $('goals-body').innerHTML=html;
    $('gsave').onclick=saveGoals;
  }catch(e){$('goals-body').innerHTML=`<div class="empty">エラー: ${esc(e.message)}</div>`;}
}
async function saveGoals(){
  const rows=[];
  document.querySelectorAll('#goals-body input').forEach(i=>{const v=parseInt((i.value||'').replace(/[^0-9]/g,''),10);
    if(isFinite(v)&&v>0)rows.push({month:i.dataset.mo,key:i.dataset.key,target:v});});
  try{
    await fetch(`${CFG.url}/rest/v1/goals?on_conflict=month,key`,{method:'POST',
      headers:{apikey:CFG.key,Authorization:'Bearer '+TOKEN,'Content-Type':'application/json',Prefer:'resolution=merge-duplicates,return=minimal'},
      body:JSON.stringify(rows)});
    alert('目標を保存しました（'+rows.length+'件）');
  }catch(e){alert('保存エラー: '+e.message);}
}
